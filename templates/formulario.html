<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Livskin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }
        .header {
            background: #C0392B;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .form-body { padding: 30px; }
        .field { margin-bottom: 18px; }
        label {
            display: block;
            font-weight: bold;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #C0392B;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #C0392B;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            letter-spacing: 1px;
        }
        button:hover { background: #a93226; }
        .mensaje {
            margin: 15px 30px 0;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">FORMULARIO LIVSKIN</div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="mensaje {% if 'obligatorio' in message %}error{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form class="form-body" method="POST">
            <div class="field">
                <label>NOMBRE</label>
                <input type="text" name="nombre" placeholder="Ingresa el nombre" autofocus>
            </div>
            <div class="field">
                <label>APELLIDO</label>
                <input type="text" name="apellido" placeholder="Ingresa el apellido">
            </div>
            <div class="field">
                <label>TRATAMIENTO</label>
                <input type="text" name="tratamiento" placeholder="Tipo de tratamiento">
            </div>
            <div class="field">
                <label>COSTO</label>
                <input type="number" name="costo" placeholder="0.00" step="0.01">
            </div>
            <button type="submit">GUARDAR</button>
        </form>
    </div>
</body>
</html>

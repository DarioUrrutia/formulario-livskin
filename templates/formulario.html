<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Livskin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            margin-bottom: 30px;
        }
        .header {
            background: white;
            text-align: center;
            padding: 20px;
            border-bottom: 3px solid #C0392B;
        }
        .header img {
            max-width: 200px;
            height: auto;
        }
        .form-body { padding: 24px; }
        .seccion {
            font-size: 11px;
            font-weight: bold;
            color: #C0392B;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 4px;
        }
        .field { margin-bottom: 14px; }
        label {
            display: block;
            font-weight: bold;
            font-size: 12px;
            color: #555;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.2s;
            background: white;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #C0392B;
        }
        .fila-dos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #C0392B;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            letter-spacing: 1px;
        }
        button:hover { background: #a93226; }
        .mensaje {
            margin: 12px 24px 0;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Livskin Logo">
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="mensaje {% if 'obligatorio' in message %}error{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form class="form-body" method="POST">

            <div class="seccion">Informacion General</div>

            <div class="fila-dos">
                <div class="field">
                    <label>Fecha</label>
                    <input type="date" name="fecha">
                </div>
                <div class="field">
                    <label>Telefono</label>
                    <input type="tel" name="telefono" placeholder="Numero">
                </div>
            </div>

            <div class="fila-dos">
                <div class="field">
                    <label>Area</label>
                    <input type="text" name="area" placeholder="Area">
                </div>
                <div class="field">
                    <label>Tipo</label>
                    <input type="text" name="tipo" placeholder="Tipo">
                </div>
            </div>

            <div class="field">
                <label>Categoria</label>
                <input type="text" name="categoria" placeholder="Categoria">
            </div>

            <div class="field">
                <label>Zona / Cantidad / Envase</label>
                <input type="text" name="zona_cantidad_envase" placeholder="Zona / Cantidad / Envase">
            </div>

            <div class="fila-dos">
                <div class="field">
                    <label>Proxima Cita</label>
                    <input type="date" name="proxima_cita">
                </div>
                <div class="field">
                    <label>Cumpleanos</label>
                    <input type="date" name="cumpleanos">
                </div>
            </div>

            <div class="seccion">Pago</div>

            <div class="fila-dos">
                <div class="field">
                    <label>Moneda</label>
                    <select name="moneda">
                        <option value="PEN">PEN - Soles</option>
                        <option value="USD">USD - Dolares</option>
                    </select>
                </div>
                <div class="field">
                    <label>Total</label>
                    <input type="number" name="total" placeholder="0.00" step="0.01">
                </div>
            </div>

            <div class="fila-dos">
                <div class="field">
                    <label>Efectivo</label>
                    <input type="number" name="efectivo" placeholder="0.00" step="0.01">
                </div>
                <div class="field">
                    <label>Yape</label>
                    <input type="number" name="yape" placeholder="0.00" step="0.01">
                </div>
            </div>

            <div class="fila-dos">
                <div class="field">
                    <label>Plin</label>
                    <input type="number" name="plin" placeholder="0.00" step="0.01">
                </div>
                <div class="field">
                    <label>Giro</label>
                    <input type="number" name="giro" placeholder="0.00" step="0.01">
                </div>
            </div>

            <div class="fila-dos">
                <div class="field">
                    <label>Debe</label>
                    <input type="number" name="debe" placeholder="0.00" step="0.01">
                </div>
                <div class="field">
                    <label>Pago Saldo</label>
                    <input type="number" name="pago_saldo" placeholder="0.00" step="0.01">
                </div>
            </div>

            <button type="submit">GUARDAR</button>
        </form>
    </div>
</body>
</html>
